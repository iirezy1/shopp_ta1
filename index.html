        const baseProducts = [

                   { cat: 'XBOX', name: 'بطاقة إكس بوكس 15$', price: 30000, icon: 'fab fa-xbox', color: 'text-green-500' },

            { cat: 'XBOX', name: 'Game Pass Ultimate (1 Month)', price: 15000, icon: 'fas fa-gamepad', color: 'text-green-400' },
            { cat: 'XBOX', name: 'Game Pass (3 Months)', price: 40000, icon: 'fas fa-gamepad', color: 'text-green-300' },
            { cat: 'MC', name: '1720 كوينز ماين كرافت', price: 7500, icon: 'fas fa-coins', color: 'text-yellow-500' },
            { cat: 'MC', name: '3500 كوينز ماين كرافت', price: 14000, icon: 'fas fa-coins', color: 'text-yellow-500' },
            { cat: 'MC', name: '8800 كوينز ماين كرافت', price: 35000, icon: 'fas fa-coins', color: 'text-yellow-600' },
                   { cat: 'MC', name: '1720 كوينز ماين كرافت', price: 7500, icon: 'fas fa-coins', color: 'text-yellow-500' },
            { cat: 'MC', name: '3500 كوينز ماين كرافت', price: 14000, icon: 'fas fa-coins', color: 'text-yellow-500' },
            { cat: 'MC', name: '8800 كوينز ماين كرافت', price: 35000, icon: 'fas fa-coins', color: 'text-yellow-600' },

            { cat: 'MC', name: 'Sky Wars Beach Pack', price: 5000, icon: 'fas fa-umbrella-beach', color: 'text-blue-400' },
            { cat: 'MC', name: 'Minecraft Realms (30 Day)', price: 12000, icon: 'fas fa-server', color: 'text-green-400' },
            { cat: 'MC', name: 'Minecraft Realms Plus', price: 18000, icon: 'fas fa-server', color: 'text-green-600' },
            { cat: 'SOCIAL', name: 'يوتيوب بريميوم (سنة)', price: 25000, icon: 'fab fa-youtube', color: 'text-red-600' },
            { cat: 'SOCIAL', name: 'يوتيوب بريميوم (6 أشهر)', price: 15000, icon: 'fab fa-youtube', color: 'text-red-500' },
            { cat: 'SOCIAL', name: 'ببجي 660 شدة (UC)', price: 12500, icon: 'fas fa-parachute-box', color: 'text-orange-500' },
            { cat: 'SOCIAL', name: 'ببجي 1800 شدة (UC)', price: 35000, icon: 'fas fa-parachute-box', color: 'text-orange-400' },
            { cat: 'SOCIAL', name: 'نتفلكس (حساب خاص شهر)', price: 10000, icon: 'fas fa-tv', color: 'text-red-700' }
        ];

        let megaDb = [];
        for(let i=0; i<3; i++) { 
            baseProducts.forEach((p, index) => {
                megaDb.push({...p, id: index + (i * 100)});
            });
        }

        function renderProducts(list = null) {
            const container = document.getElementById('productContainer');
            const data = list || (currentFilter === 'ALL' ? megaDb : megaDb.filter(i => i.cat === currentFilter));
            container.innerHTML = data.map(p => {
                const price = Math.ceil(p.price * rates[activeCurrency]).toLocaleString();
                return `
                <div class="product-card p-6 animate__animated animate__zoomIn">
                    <div class="text-center">
                        <i class="${p.icon} text-5xl ${p.color} mb-6 block drop-shadow-lg"></i>
                        <h3 class="font-bold text-sm h-10 overflow-hidden text-gray-200">${p.name}</h3>
                        <div class="bg-white/5 py-2 rounded-lg mt-4 border border-white/5">
                            <p class="text-green-500 font-black text-2xl">${price} <span class="text-[10px] text-gray-400">${activeCurrency}</span></p>
                        </div>
                    </div>
                    <button onclick="addToCart('${p.name}', ${p.price})" class="mt-6 w-full bg-white/5 py-4 rounded-xl text-[12px] font-black hover:bg-green-500 hover:text-black transition-all border border-white/10">أضف للطلب +</button>
                </div>`;
            }).join('');
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cartCount').innerText = cart.length;
            const btn = event.target;
            btn.innerText = "تمت الإضافة ✓";
            setTimeout(() => btn.innerText = "أضف للطلب +", 1000);
        }

        function changeCurrency() {
            activeCurrency = document.getElementById('currencySel').value;
            renderProducts();
            if(!document.getElementById('checkoutModal').classList.contains('hidden')) updatePaymentMethods();
        }

        function updatePaymentMethods() {
            const sel = document.getElementById('payMethod');
            if(activeCurrency === 'IQD') {
                sel.innerHTML = `
                    <option value="اسياسيل">رصيد آسيا (اسياسيل)</option>
                    <option value="زين العراق">رصيد زين</option>
                    <option value="زين كاش">زين كاش - ZainCash</option>
                    <option value="ماستر كارد">ماستر كارد (الرافدين/الرشيد)</option>
                `;
            } else {
                sel.innerHTML = `<option value="بايبال">PayPal Business</option><option value="بطاقة">Visa / MasterCard</option>`;
            }
            refreshInvoice();
        }

        function refreshInvoice() {
            const name = document.getElementById('custName').value || "عميل SHOP_tA1";
            const user = document.getElementById('gameUser').value || "لم يحدد";
            const method = document.getElementById('payMethod').value;
            const total = cart.reduce((s, i) => s + i.price, 0);
            const convTotal = Math.ceil(total * rates[activeCurrency]).toLocaleString();

            let bill = `🎫 فاتورة طلب SHOP_tA1\n👤 العميل: ${name}\n🎮 اليوزر/ID: ${user}\n----------------\n`;
            cart.forEach((i, idx) => bill += `${idx+1}. ${i.name}\n`);
            bill += `----------------\n💰 الإجمالي: ${convTotal} ${activeCurrency}\n💳 وسيلة الدفع: ${method}`;

            const transferArea = document.getElementById('transferCodeArea');
            if(activeCurrency === 'IQD' && (method === 'اسياسيل' || method === 'زين العراق')) {
                transferArea.classList.remove('hidden');
                const code = `*123*${total}*07718457710*1#`;
                document.getElementById('transferCodeText').innerText = code;
                bill += `\n🔢 كود التحويل: ${code}`;
            } else { transferArea.classList.add('hidden'); }
            
            document.getElementById('billText').innerText = bill;
        }

        // الوظيفة الجديدة: الاتصال المباشر بكود التحويل حسب السعر
        function callTransferCode() {
            if(cart.length === 0) return alert("سلتك فارغة!");
            const total = cart.reduce((s, i) => s + i.price, 0);
            const code = `*123*${total}*07718457710*1#`;
            window.location.href = "tel:" + encodeURIComponent(code);
        }

        function openCheckoutModal() { 
            if(cart.length === 0) return alert("سلة التسوق فارغة يا بطل!"); 
            updatePaymentMethods();
            document.getElementById('checkoutModal').classList.remove('hidden'); 
            refreshInvoice();
        }

        function closeCheckoutModal() { document.getElementById('checkoutModal').classList.add('hidden'); }

        function processOrder(p) {
            const text = encodeURIComponent(document.getElementById('billText').innerText);
            if(p === 'WA') window.open(`https://wa.me/9647718457710?text=${text}`);
        }

        function sendSupportMessage() {
            const n = document.getElementById('contactName').value;
            const t = document.getElementById('contactType').value;
            const m = document.getElementById('contactMsg').value;
            if(!n || !m) return alert("يرجى ملء الاسم والرسالة أولاً");
            window.open(`https://wa.me/9647718457710?text=${encodeURIComponent("👤 الإسم: "+n+"\n🛠 النوع: "+t+"\n📝 الرسالة: "+m)}`);
        }

        function clearCart() { cart = []; document.getElementById('cartCount').innerText = 0; closeCheckoutModal(); }

        function liveSearch() {
            const term = document.getElementById('mainSearch').value.toLowerCase();
            const filtered = megaDb.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function filterCat(c) {
            currentFilter = c;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+c).classList.add('active');
            renderProducts();
        }

        function copyTransferCode() {
            const code = document.getElementById('transferCodeText').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert("تم نسخ الكود بنجاح!");
                window.location.href = "tel:" + encodeURIComponent(code);
            }).catch(() => {
                window.location.href = "tel:" + encodeURIComponent(code);
            });
        }

        window.onload = () => { renderProducts(); };
    </script>
</body>
</html>
